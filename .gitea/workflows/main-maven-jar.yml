name: Build and Run AI Code Review By Main Maven Jar
defaults:
  run:
    shell: powershell
# 当有代码推送到仓库的 main 分支时，这个 Actions 工作流会被触发并执行
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    # 指定了作业运行的环境
    runs-on: windows
    steps:
      - name: Check ACTION_TOKEN
        run: |
          if ([string]::IsNullOrEmpty($env:ACTION_TOKEN)) {
            Write-Error "ERROR: ACTION_TOKEN is empty or not found!"
            exit 1
          } else {
            Write-Output "ACTION_TOKEN is set (length: $($env:ACTION_TOKEN.Length))"
          }
        shell: powershell
        env:
          ACTION_TOKEN: ${{ secrets.ACTION_TOKEN }}
      - name: Checkout repository
        uses: https://gitea.com/actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTION_TOKEN }}

      - name: Set up JDK 17
        uses: https://gitea.com/actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        shell: cmd
        run: mvn clean install

      - name: Copy ai-code-review-sdk JAR
        shell: cmd
        run: mvn dependency:copy -Dartifact=io.github.emryscheng:ai-code-review-sdk:1.0 -DoutputDirectory=./libs

      - name: Run code review
        shell: cmd
        run: java -jar ./libs/ai-code-review-sdk-1.0.jar